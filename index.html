<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="Styles/Index.css">
</head>

<body>
  <div class="login-container">
    <img class="icono-usuario" src="images/usuario icono.jpg" alt="">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
      <input type="text" id="usuario" placeholder="Usuario" required>
      <input type="password" id="password" placeholder="Contraseña" required>
      <button type="submit">Entrar</button>
    </form>

    <p id="mensaje"></p>
    <button id="btnContinuar" style="display:none;" onclick="window.location.href='inicio.html'">
      Continuar
    </button>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault(); // evita envío

      const usuario = document.getElementById("usuario").value;
      const password = document.getElementById("password").value;
      const mensaje = document.getElementById("mensaje");
      const boton = document.getElementById("btnContinuar");

      if (usuario === "sensei" && password === "1234") {
        mensaje.style.color = "green";
        mensaje.textContent = "Acceso correcto";

        boton.style.display = "block";
      } else {
        mensaje.style.color = "red";
        mensaje.textContent = "Usuario o contraseña incorrectos";

        boton.style.display = "none";
      }
    });
  </script>

</body>

</html>
